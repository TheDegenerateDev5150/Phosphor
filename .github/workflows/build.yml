name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Dependencies
        run: brew install libimobiledevice

      - name: Run Regression Checks
        run: Scripts/regression/run.py

      - name: Build Debug
        run: swift build

      - name: Build Release
        run: swift build -c release

      - name: Create App Bundle
        run: bash Scripts/build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phosphor.app
          path: .build/Phosphor.app
          retention-days: 14

  release:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Require signing secrets
        run: |
          set -e
          missing=()
          [ -n "${DEVELOPER_ID_P12_BASE64:-}" ] || missing+=(DEVELOPER_ID_P12_BASE64)
          [ -n "${DEVELOPER_ID_P12_PASSWORD:-}" ] || missing+=(DEVELOPER_ID_P12_PASSWORD)
          [ -n "${DEVELOPER_ID:-}" ] || missing+=(DEVELOPER_ID)
          [ -n "${TEAM_ID:-}" ] || missing+=(APPLE_TEAM_ID)
          [ -n "${APP_STORE_CONNECT_KEY_BASE64:-}" ] || missing+=(APP_STORE_CONNECT_KEY_BASE64)
          [ -n "${APP_STORE_CONNECT_KEY_ID:-}" ] || missing+=(APP_STORE_CONNECT_KEY_ID)
          [ -n "${APP_STORE_CONNECT_ISSUER_ID:-}" ] || missing+=(APP_STORE_CONNECT_ISSUER_ID)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Refusing to publish unsigned release. Missing GitHub secrets: ${missing[*]}"
            echo "Configure them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Dependencies
        run: brew install libimobiledevice

      - name: Build Release
        run: |
          swift build -c release
          bash Scripts/build.sh

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sign.keychain-db"
          KC_PASS="$(openssl rand -base64 32)"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KC_PASS=$KC_PASS" >> "$GITHUB_ENV"

          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          rm -f "$CERT_PATH"

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KEYCHAIN"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Sign + notarize + staple (ASC API key)
        run: |
          set -euo pipefail
          APP=".build/Phosphor.app"
          DMG=".build/Phosphor.dmg"
          ENTITLEMENTS="Resources/Phosphor.entitlements"

          echo "== Codesign app =="
          codesign --force --deep --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --timestamp \
            --sign "$DEVELOPER_ID" \
            "$APP"
          codesign --verify --verbose=2 "$APP"

          echo "== Build DMG =="
          bash Scripts/create-dmg.sh

          echo "== Codesign DMG =="
          codesign --force --sign "$DEVELOPER_ID" --timestamp "$DMG"

          echo "== Materialise ASC API key =="
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          echo "== Submit to Apple notary =="
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          rm -f "$KEY_PATH"

          echo "== Staple ticket =="
          xcrun stapler staple "$DMG"

      - name: Verify DMG signing and notarization
        run: |
          set -e
          DMG=".build/Phosphor.dmg"
          spctl -a -vv -t install "$DMG"
          xcrun stapler validate "$DMG"

      - name: Tear down keychain
        if: always() && env.KEYCHAIN != ''
        run: security delete-keychain "$KEYCHAIN" || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/Phosphor.dmg
          generate_release_notes: true

      - name: Update in-tree Homebrew cask
        run: |
          set -euo pipefail
          DMG=".build/Phosphor.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::No DMG produced - cannot update cask."
            exit 1
          fi

          # Guard: bump cask only when the DMG passes Gatekeeper + has a stapled ticket.
          if ! spctl -a -vv -t install "$DMG" 2>&1 | grep -q "accepted"; then
            echo "::error::DMG is not Gatekeeper-approved. Cask not updated."
            exit 1
          fi
          if ! xcrun stapler validate "$DMG" >/dev/null 2>&1; then
            echo "::error::DMG has no stapled notarization ticket. Cask not updated."
            exit 1
          fi

          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          CASK="Homebrew/phosphor.rb"
          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          echo "Updated $CASK to ${VERSION} / ${SHA}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          if ! git diff --cached --quiet; then
            git commit -m "homebrew: bump cask to ${TAG} (auto)"
            git push origin HEAD:main
          else
            echo "Cask already up-to-date."
          fi

      - name: Sync external Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          # No-op unless a tap PAT is configured. When set, keep the external tap
          # (momenbasel/homebrew-phosphor) on the SAME version + DMG SHA as the
          # in-repo cask, so `brew install --cask momenbasel/phosphor/phosphor`
          # never drifts behind a release (root cause of issue #21).
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set - skipping external tap sync."
            echo "Add it at https://github.com/${{ github.repository }}/settings/secrets/actions to auto-sync the tap."
            exit 0
          fi

          DMG=".build/Phosphor.dmg"
          if ! xcrun stapler validate "$DMG" >/dev/null 2>&1; then
            echo "::error::DMG has no stapled ticket. External tap not updated."
            exit 1
          fi

          TAP_REPO="momenbasel/homebrew-phosphor"
          TAP_CASK_PATH="Casks/phosphor.rb"
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')

          TAP_TMP="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_TMP"
          CASK="$TAP_TMP/$TAP_CASK_PATH"
          if [ ! -f "$CASK" ]; then
            echo "::error::$TAP_CASK_PATH not found in $TAP_REPO"
            exit 1
          fi
          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          git -C "$TAP_TMP" config user.name  "github-actions[bot]"
          git -C "$TAP_TMP" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$TAP_TMP" add "$TAP_CASK_PATH"
          if ! git -C "$TAP_TMP" diff --cached --quiet; then
            git -C "$TAP_TMP" commit -m "phosphor: bump cask to ${TAG} (same DMG SHA as in-repo cask)"
            git -C "$TAP_TMP" push origin HEAD
            echo "External tap synced to ${VERSION} / ${SHA}"
          else
            echo "External tap already up-to-date."
          fi
          rm -rf "$TAP_TMP"
