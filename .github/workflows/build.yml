name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Dependencies
        run: brew install libimobiledevice

      - name: Build Debug
        run: swift build

      - name: Build Release
        run: swift build -c release

      - name: Create App Bundle
        run: bash Scripts/build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phosphor.app
          path: .build/Phosphor.app
          retention-days: 14

  release:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Require signing secrets
        run: |
          set -e
          missing=()
          [ -n "${DEVELOPER_ID_P12_BASE64:-}" ] || missing+=(DEVELOPER_ID_P12_BASE64)
          [ -n "${DEVELOPER_ID_P12_PASSWORD:-}" ] || missing+=(DEVELOPER_ID_P12_PASSWORD)
          [ -n "${DEVELOPER_ID:-}" ] || missing+=(DEVELOPER_ID)
          [ -n "${APPLE_ID:-}" ] || missing+=(APPLE_ID)
          [ -n "${APP_PASSWORD:-}" ] || missing+=(APPLE_ID_PASSWORD)
          [ -n "${TEAM_ID:-}" ] || missing+=(APPLE_TEAM_ID)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Refusing to publish unsigned release. Missing GitHub secrets: ${missing[*]}"
            echo "Configure them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Dependencies
        run: brew install libimobiledevice

      - name: Build Release
        run: |
          swift build -c release
          bash Scripts/build.sh

      - name: Import Developer ID certificate
        if: env.DEVELOPER_ID_P12_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sign.keychain-db"
          KC_PASS="$(openssl rand -base64 32)"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KC_PASS=$KC_PASS" >> "$GITHUB_ENV"

          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Put our keychain in the search list (append to the existing user list).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KEYCHAIN"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Sign, notarize, staple
        if: env.DEVELOPER_ID_P12_BASE64 != ''
        run: bash Scripts/notarize.sh

      - name: Create DMG (unsigned fallback)
        if: env.DEVELOPER_ID_P12_BASE64 == ''
        run: bash Scripts/create-dmg.sh

      - name: Verify DMG signing and notarization
        run: |
          DMG=".build/Phosphor.dmg"
          echo "== spctl =="
          spctl -a -vv -t install "$DMG" || echo "(unsigned - ad-hoc only)"
          echo "== stapler =="
          xcrun stapler validate "$DMG" || echo "(no stapled ticket)"

      - name: Tear down keychain
        if: always() && env.KEYCHAIN != ''
        run: security delete-keychain "$KEYCHAIN" || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/Phosphor.dmg
          generate_release_notes: true

      - name: Update in-tree Homebrew cask
        run: |
          set -euo pipefail
          DMG=".build/Phosphor.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::No DMG produced - cannot update cask."
            exit 1
          fi

          # Guard: refuse to bump the cask unless the DMG is both Gatekeeper-approved
          # and has a stapled notarization ticket. Prevents shipping an unsigned
          # build that brew users would then fail to install.
          if ! spctl -a -vv -t install "$DMG" 2>&1 | grep -q "accepted"; then
            echo "::error::DMG is not Gatekeeper-approved. Cask not updated."
            exit 1
          fi
          if ! xcrun stapler validate "$DMG" >/dev/null 2>&1; then
            echo "::error::DMG has no stapled notarization ticket. Cask not updated."
            exit 1
          fi

          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          CASK="Homebrew/phosphor.rb"
          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          echo "Updated $CASK to ${VERSION} / ${SHA}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          if ! git diff --cached --quiet; then
            git commit -m "homebrew: bump cask to ${TAG} (auto)"
            git push origin HEAD:main
          else
            echo "Cask already up-to-date."
          fi
